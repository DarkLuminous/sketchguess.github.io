<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SketchGuess — Draw &amp; Guess with Character!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- Confetti canvas (fixed overlay) -->
<canvas id="confetti" style="position:fixed; inset:0; pointer-events:none; z-index:200"></canvas>

<!-- ── LOBBY ────────────────────────────────────────────────────────────────── -->
<section id="lobby">
  <div class="logo">✏️ SketchGuess</div>
  <div class="tagline">Draw it. Guess it. Win it.</div>
  <div class="lobby-card">
    <div class="input-group">
      <label>Your Name</label>
      <input type="text" id="player-name" placeholder="Enter your name…" maxlength="16">
    </div>

    <div class="char-selector">
      <label>🎭 Your Character</label>
      <div class="char-grid" id="avatar-selector"></div>
    </div>

    <button class="btn btn-primary" onclick="createRoom()">🎨 Create New Room</button>

    <div class="divider">OR</div>

    <div class="input-group">
      <label>Room Code</label>
      <input type="text" id="room-code-input" placeholder="e.g. AB12CD" maxlength="6" style="text-transform:uppercase">
    </div>
    <button class="btn btn-secondary" onclick="joinRoom()">🚪 Join Room</button>

    <div class="error-msg" id="lobby-error"></div>
  </div>
</section>

<!-- ── WAITING ROOM ──────────────────────────────────────────────────────────── -->
<section id="waiting">
  <div class="logo" style="font-size:2rem;">✏️ SketchGuess</div>
  <div class="room-code-display">
    <small>Room Code — share with friends!</small>
    <div class="code" id="waiting-code">------</div>
  </div>
  <div style="color:var(--muted); font-weight:700;">
    Players: <span id="player-count">1</span>/10
  </div>
  <div class="players-grid" id="waiting-players"></div>
  <div style="display:flex; gap:12px;">
    <button class="btn btn-success" id="start-btn" onclick="startGame()" style="display:none">▶ Start Game</button>
    <button class="btn btn-danger"  onclick="exitToLobby()">🚪 Leave Room</button>
  </div>
</section>

<!-- ── GAME SCREEN ───────────────────────────────────────────────────────────── -->
<div id="game">
  <header class="topbar">
    <div style="font-family:'Fredoka One',cursive; font-size:1.2rem;">✏️ SG</div>
    <div class="room-badge" id="game-room-code">ROOM: ----</div>
    <div class="round-info">Round <span id="top-round">1</span></div>
    <div class="word-display" id="word-display">_ _ _ _ _</div>
    <div class="timer-ring">
      <svg width="44" height="44">
        <circle cx="22" cy="22" r="18" fill="none" stroke="var(--border)" stroke-width="4"/>
        <circle id="timer-arc" cx="22" cy="22" r="18" fill="none"
                stroke="var(--accent)" stroke-width="4"
                stroke-dasharray="113" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-text" id="timer-text">50</div>
    </div>
    <button class="exit-game-btn" onclick="exitToLobby()">🚪 Exit</button>
  </header>

  <aside class="sidebar-left">
    <h3>🏆 LEADERBOARD</h3>
    <div id="leaderboard"></div>
  </aside>

  <main class="canvas-wrap" id="canvas-wrap">
    <div id="floating-artist" class="floating-artist" style="display:none;">
      <span class="artist-avatar" id="artist-avatar">🎨</span>
      <span class="artist-name"  id="artist-name">Drawing...</span>
    </div>
    <canvas id="drawing-canvas"></canvas>
    <div class="toolbar" id="toolbar">
      <div id="color-palette"  style="display:flex; gap:6px;"></div>
      <div id="size-btns"      style="display:flex; gap:6px;"></div>
      <button class="tool-btn" id="eraser-btn" onclick="toggleEraser()">⌫ Eraser</button>
      <button class="tool-btn" onclick="clearCanvas()">🗑 Clear</button>
    </div>
  </main>

  <aside class="sidebar-right">
    <h3>💬 Guesses</h3>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-wrap">
      <input type="text" id="guess-input" placeholder="Type your guess…"
             onkeydown="if(event.key==='Enter') sendGuess()">
      <button onclick="sendGuess()">→</button>
    </div>
  </aside>

  <!-- Mobile-only bottom tab bar -->
  <nav class="mobile-tabs" id="mobile-tabs">
    <button class="mobile-tab active" id="tab-canvas" onclick="switchMobileTab('canvas')">
      <span class="tab-icon">🎨</span>Canvas
    </button>
    <button class="mobile-tab" id="tab-scores" onclick="switchMobileTab('scores')">
      <span class="tab-icon">🏆</span>Scores
    </button>
    <button class="mobile-tab" id="tab-chat" onclick="switchMobileTab('chat')">
      <span class="tab-icon">💬</span>Guesses
    </button>
  </nav>
</div>

<!-- ── OVERLAYS ──────────────────────────────────────────────────────────────── -->
<div class="overlay" id="round-end-overlay">
  <div class="overlay-card">
    <h2>⏱ Round Over!</h2>
    <p>The word was…</p>
    <div id="revealed-word" style="font-family:'Fredoka One',cursive; font-size:2rem; color:var(--accent2); margin-top:12px;"></div>
  </div>
</div>

<div class="overlay" id="gameover-overlay">
  <div class="overlay-card">
    <h2>🏆 Game Over!</h2>
    <ul class="scoreboard" id="final-scoreboard" style="list-style:none; margin:20px 0;"></ul>
    <button class="btn btn-success" onclick="newGame()"     style="margin-bottom:10px;">🔄 New Game</button>
    <button class="btn btn-danger"  onclick="exitToLobby()">🏠 Leave Room</button>
  </div>
</div>

<!-- Socket.io client (served by server automatically) -->
<script src="/socket.io/socket.io.js"></script>
<!-- Game logic -->
<script src="/game.js"></script>

</body>
</html>
